name: Stamp README date

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  stamp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update last-updated line
        run: |
          ts=$(date -u '+%Y-%m-%d %H:%M UTC')
          sed -i "s|^_Last updated:.*|_Last updated: ${ts}._|" README.md
      - name: Commit if changed
        run: |
          if ! git diff --quiet README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "Stamp README last-updated [skip ci]"
            git push
          fi
